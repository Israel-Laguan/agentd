# agentd configuration reference
# Copy to ~/.agentd/config.yaml or pass via: agentd --config <path>

# Filesystem layout (usually derived from --home).
home: ~/.agentd
db_path: ~/.agentd/global.db
projects_dir: ~/.agentd/projects
uploads_dir: ~/.agentd/uploads

# HTTP API.
api:
  address: "127.0.0.1:8765"
  # When non-empty, POST /api/v1/projects/materialize requires header
  # X-Agentd-Materialize-Token with this exact value (CLI `agentd ask` sends it automatically).
  materialize_token: ""

# AI gateway.
gateway:
  order: [openai, anthropic, ollama]
  max_tasks_per_phase: 7
  openai:
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    api_key: "" # or set OPENAI_API_KEY
    max_input_chars: 0 # 0 = use gateway.truncator.max_input_chars
    timeout: "5m"      # protect against slow LLM response (defaults to 5m)
  anthropic:
    base_url: "https://api.anthropic.com"
    model: "claude-3-haiku-20240307"
    api_key: "" # or set ANTHROPIC_API_KEY
    max_input_chars: 0
    timeout: "5m"      # protect against slow LLM response (defaults to 5m)
  ollama:
    base_url: "http://127.0.0.1:11434"
    model: "llama3:8b"
    max_input_chars: 0
    timeout: "5m"      # protect against slow local inference (defaults to 5m)
  llamacpp:
    base_url: "http://127.0.0.1:8080"
    model: "gpt-4"  # change this to match your GGUF model filename (e.g., "Qwen3.6-35B-A3B-APEX-I-Balanced.gguf")
    max_input_chars: 0
    timeout: "5m"   # protect against slow local inference
  horde:
    base_url: "https://aihorde.net/api"
    api_key: "0000000000"
    model: ""
    max_input_chars: 0
    timeout: "5m"
    poll_interval: "4s"
  budget:
    tokens_per_task: 50000 # per-task token cap; 0 = unlimited (Danger A)
  role_models:             # Flow 6.3: specialized model routing
    chat:                  # high-reasoning model for planning/intent
      provider: ""         # empty = use default cascade order
      model: ""
    worker:                # fast coding model for task execution
      provider: ""
      model: ""
    memory:                # cheap model for summarization/curation
      provider: ""
      model: ""
  truncator:
    policy: "head_tail" # head_tail | middle_out | summarize | reject
    max_input_chars: 12000
  truncation:
    strategy: "head_tail"
    head_ratio: 0.5
    max_input_chars: 12000
    stash_threshold: 50000
  # MCP (Model Context Protocol) capabilities - external tool servers
  # capabilities:
  #   - type: mcp
  #     name: "github"
  #     server_url: "https://api.example.com/mcp"
  #     auth:
  #       type: bearer
  #       token: "${MCP_TOKEN}"

# Per-tool rate limiting (PreToolUse).
# Keys are tool names; values are max invocations per session.
# The special "default" key applies to any tool without an explicit entry.
# 0 or absent = unlimited.
# Future extension: values may become objects with max_calls / window_seconds.
agentic:
  tool_rate_limits:
    bash: 50
    default: 100

# Sandbox command execution hardening.
sandbox:
  inactivity_timeout: "60s"
  wall_timeout: "10m"
  kill_grace: "2s"
  max_log_bytes: 5242880
  env_allowlist: [PATH, HOME, LANG, LC_ALL, USER]
  extra_env: ["CI=true", "DEBIAN_FRONTEND=noninteractive", "NO_COLOR=1"]
  scrub_patterns: []
  limits:
    address_space_bytes: 2147483648
    cpu_seconds: 600
    open_files: 1024
    processes: 256

# Self-healing.
healing:
  enabled: true
  strategy: "increase_effort"
  steps: []
  max_adjustments: 0
  upgrade_model: ""
  upgrade_provider: ""
  context_multiplier: 2.0

# Circuit breaker.
breaker:
  handoff_after: "2m"

# Disk watchdog.
disk:
  free_threshold_percent: 10.0

# Queue daemon.
queue:
  task_deadline: "10m"       # wall-clock timeout per worker task (the Reaper)
  poll_max_interval: "10s"   # adaptive backoff ceiling when no tasks are available
  agentic_truncator_max: 30  # max messages after truncation in agentic mode
  agentic_truncation_threshold: 40  # message count threshold triggering truncation
  agentic_character_budget: 0  # max characters (0 = unlimited) for agentic mode truncation
  instructions:
    project_file: ".agentd/AGENTS.md"      # project-level instructions (relative to workspace)
    user_preferences_file: "prefs.yaml"   # user preferences (relative to ~/.agentd/)

# Heartbeat reconciliation.
heartbeat:
  stale_after: "2m"

# Librarian log archival, memory curation, and recall.
librarian:
  retention_hours: 24              # completed task age before curation eligibility
  archive_grace_days: 7            # days to retain tar.gz archives after memory ingestion
  chunk_chars: 8000                # max chars per map-phase summarization chunk
  max_reduce_passes: 3             # recursive reduce rounds before concatenating
  fallback_head_tail_chars: 2000   # chars kept from head/tail in deterministic fallback
  recall_timeout: "500ms"          # hard timeout for memory recall (Danger B)
  recall_top_k: 5                  # max memories returned per recall
  preferences_top_k: 3             # max user preferences per recall
  dream_cluster_min_size: 3        # min cluster size for dream consolidation
  dream_similarity_threshold: 0.7  # Jaccard threshold for memory clustering

# Plugin infrastructure.
# Plugins are directories inside the configured path, each containing a
# manifest.json that declares hooks, capabilities, and env requirements.
# Load order is determined by numeric directory prefix (01-security/,
# 02-observability/, 10-code-quality/) or by the manifest "priority" field.
# A restart is required to pick up new or changed plugins.
plugins:
  enabled: false
  path: "~/.agentd/plugins"          # directory scanned for plugin sub-directories
  shell_hook_timeout: "3s"           # default timeout for shell-based hooks
